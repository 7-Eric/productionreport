
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.app{padding:1.5rem 0}
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.top-bar h1{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--color-background-info);color:var(--color-text-info);font-weight:500}
.tabs{display:flex;gap:4px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.5rem}
.tab{padding:8px 16px;font-size:13px;color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500}
.tab:hover:not(.active){color:var(--color-text-primary)}
.section-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.section-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.section-title i{font-size:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:var(--color-text-secondary)}
.field input,.field select,.field textarea{font-size:13px;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);width:100%}
.field textarea{resize:vertical;min-height:60px;font-family:var(--font-sans)}
.buyer-row{display:grid;grid-template-columns:90px 1fr 1fr 1fr 80px;gap:8px;align-items:center;margin-bottom:6px}
.buyer-label{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.line-row{display:grid;grid-template-columns:1fr 60px 60px 1fr;gap:8px;align-items:center;margin-bottom:6px}
.hr-row{display:grid;grid-template-columns:80px 70px 70px;gap:8px;align-items:center;margin-bottom:6px}
.hr-label{font-size:13px;color:var(--color-text-primary)}
.issue-block{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px;margin-bottom:8px}
.issue-num{font-size:11px;font-weight:500;color:var(--color-text-info);margin-bottom:8px}
.generate-btn{width:100%;padding:10px;font-size:14px;font-weight:500;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;margin-top:1rem}
.generate-btn:hover{opacity:.85}
.generate-btn:disabled{opacity:.4;cursor:not-allowed}
.output-area{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-top:1rem;min-height:200px;font-size:13px;color:var(--color-text-primary);line-height:1.8;white-space:pre-wrap;font-family:var(--font-sans)}
.output-placeholder{color:var(--color-text-tertiary);font-size:13px;text-align:center;padding:2rem 0}
.copy-btn{display:flex;align-items:center;gap:6px;font-size:12px;padding:6px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:none;color:var(--color-text-secondary);cursor:pointer;margin-top:8px}
.copy-btn:hover{background:var(--color-background-secondary)}
.spinner{width:16px;height:16px;border:2px solid transparent;border-top-color:var(--color-background-primary);border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.tab-panel{display:none}.tab-panel.active{display:block}
.col-h{font-size:11px;color:var(--color-text-tertiary);text-align:center}
.divider{height:0.5px;background:var(--color-border-tertiary);margin:12px 0}
</style>

<div class="app">
  <div class="top-bar">
    <h1>주간 보고서 자동 생성</h1>
    <span class="badge">AI 기반</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('sales')"><i class="ti ti-trending-up"></i> 출고·매출</button>
    <button class="tab" onclick="switchTab('buyers')"><i class="ti ti-building-store"></i> 바이어</button>
    <button class="tab" onclick="switchTab('ops')"><i class="ti ti-tools"></i> 운영·인원</button>
    <button class="tab" onclick="switchTab('issues')"><i class="ti ti-alert-circle"></i> 이슈·계획</button>
  </div>

  <div id="tab-sales" class="tab-panel active">
    <div class="section-card">
      <div class="section-title"><i class="ti ti-package-export" aria-hidden="true"></i>출고 / 매출</div>
      <div style="display:grid;grid-template-columns:130px 1fr 1fr;gap:8px;margin-bottom:4px">
        <div></div><div class="col-h">금주 실적</div><div class="col-h">전주 실적</div>
      </div>
      <div id="sales-rows"></div>
    </div>
  </div>

  <div id="tab-buyers" class="tab-panel">
    <div class="section-card">
      <div class="section-title"><i class="ti ti-users" aria-hidden="true"></i>주요 바이어 수주 현황 (2026)</div>
      <div style="display:grid;grid-template-columns:90px 1fr 1fr 1fr 80px;gap:8px;margin-bottom:4px">
        <div></div>
        <div class="col-h">YTD Qty</div>
        <div class="col-h">YTD Amt (USD)</div>
        <div class="col-h">Plan (USD)</div>
        <div class="col-h">달성율</div>
      </div>
      <div id="buyer-rows"></div>
    </div>
  </div>

  <div id="tab-ops" class="tab-panel">
    <div class="section-card">
      <div class="section-title"><i class="ti ti-building-factory-2" aria-hidden="true"></i>Line 운용 현황</div>
      <div style="display:grid;grid-template-columns:1fr 60px 60px 1fr;gap:8px;margin-bottom:4px">
        <div class="col-h">Factory</div><div class="col-h">Total</div><div class="col-h">Running</div><div class="col-h">주요 품목</div>
      </div>
      <div id="line-rows"></div>
    </div>
    <div class="section-card">
      <div class="section-title"><i class="ti ti-id-badge" aria-hidden="true"></i>인원 현황</div>
      <div style="display:grid;grid-template-columns:80px 70px 70px;gap:8px;margin-bottom:4px">
        <div></div><div class="col-h">전주</div><div class="col-h">금주</div>
      </div>
      <div id="hr-rows"></div>
      <div class="divider"></div>
      <div class="grid-2" style="gap:1rem">
        <div class="field"><label>입사자 (성명/직급/부서)</label><textarea id="joiners" placeholder="예: 홍길동/과장/영업부, 김영희/대리/생산부"></textarea></div>
        <div class="field"><label>퇴사자 (성명/직급/부서)</label><textarea id="leavers" placeholder="예: 이철수/부장/관리부"></textarea></div>
      </div>
    </div>
  </div>

  <div id="tab-issues" class="tab-panel">
    <div class="section-card">
      <div class="section-title"><i class="ti ti-alert-triangle" aria-hidden="true"></i>주간 이슈 사항</div>
      <div id="issue-blocks"></div>
    </div>
    <div class="section-card">
      <div class="section-title"><i class="ti ti-checklist" aria-hidden="true"></i>차주 중점 추진 업무</div>
      <div id="task-rows"></div>
    </div>
    <div class="section-card">
      <div class="section-title"><i class="ti ti-plane-departure" aria-hidden="true"></i>방문 계획 / 지원 요청사항</div>
      <div class="grid-2" style="gap:1rem">
        <div class="field"><label>금주·차주 방문 계획</label><textarea id="visits" rows="4" placeholder="예: 6/24 Kohl's 바이어 미팅 (홍길동 참석, Q3 오더 협의)"></textarea></div>
        <div class="field"><label>지원 요청사항</label><textarea id="support" rows="4" placeholder="예: 원자재 조달 지원 요청 (구매팀, 6/30까지)"></textarea></div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-title"><i class="ti ti-sliders" aria-hidden="true"></i>보고서 옵션</div>
      <div class="grid-2" style="gap:1rem">
        <div class="field">
          <label>보고서 언어</label>
          <select id="lang">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="both">한국어 + English</option>
          </select>
        </div>
        <div class="field">
          <label>보고서 형식</label>
          <select id="format">
            <option value="executive">경영진 요약 보고</option>
            <option value="detailed">전체 상세 보고</option>
            <option value="kpi">KPI 중심 보고</option>
          </select>
        </div>
      </div>
      <div class="field" style="margin-top:10px">
        <label>추가 지시사항 (선택)</label>
        <textarea id="extra" rows="2" placeholder="예: 전주 대비 출고 감소 원인 분석 강조, 톤은 간결하게"></textarea>
      </div>
    </div>

    <button class="generate-btn" onclick="generate()" id="gen-btn">
      <div class="spinner" id="spin"></div>
      <i class="ti ti-sparkles" id="btn-icon"></i>
      <span id="btn-label">보고서 생성하기 ↗</span>
    </button>
  </div>

  <div id="output-wrap" style="display:none">
    <div class="output-area" id="output"></div>
    <button class="copy-btn" onclick="copyOutput()"><i class="ti ti-copy"></i> 복사하기</button>
  </div>
</div>

<script>
const salesLabels = ['출고 수량 (pcs)', '출고 금액 (USD)', '매출 금액 (USD)', 'YTD 매출 (USD)'];
const buyerLabels = ["Kohl's", 'A&F', 'SanMar', 'FILA', '기타'];
const lineCount = 3;
const hrLabels = ['SG', 'SA', 'Staff', '파견직'];
const issueCount = 2;
const taskCount = 3;

function buildSalesRows(){
  const c = document.getElementById('sales-rows');
  salesLabels.forEach((l,i)=>{
    c.innerHTML += `<div style="display:grid;grid-template-columns:130px 1fr 1fr;gap:8px;margin-bottom:6px;align-items:center">
      <span style="font-size:13px;color:var(--color-text-primary)">${l}</span>
      <input type="text" id="s_cur_${i}" placeholder="금주">
      <input type="text" id="s_pre_${i}" placeholder="전주">
    </div>`;
  });
}

function buildBuyerRows(){
  const c = document.getElementById('buyer-rows');
  buyerLabels.forEach((l,i)=>{
    c.innerHTML += `<div style="display:grid;grid-template-columns:90px 1fr 1fr 1fr 80px;gap:8px;margin-bottom:6px;align-items:center">
      <span class="buyer-label">${l}</span>
      <input type="text" id="b_qty_${i}" placeholder="수량">
      <input type="text" id="b_amt_${i}" placeholder="금액">
      <input type="text" id="b_plan_${i}" placeholder="Plan">
      <input type="text" id="b_rate_${i}" placeholder="%">
    </div>`;
  });
}

function buildLineRows(){
  const c = document.getElementById('line-rows');
  for(let i=0;i<lineCount;i++){
    c.innerHTML += `<div style="display:grid;grid-template-columns:1fr 60px 60px 1fr;gap:8px;margin-bottom:6px;align-items:center">
      <input type="text" id="l_fac_${i}" placeholder="공장명">
      <input type="text" id="l_tot_${i}" placeholder="총">
      <input type="text" id="l_run_${i}" placeholder="가동">
      <input type="text" id="l_item_${i}" placeholder="주요 품목">
    </div>`;
  }
}

function buildHrRows(){
  const c = document.getElementById('hr-rows');
  hrLabels.forEach((l,i)=>{
    c.innerHTML += `<div style="display:grid;grid-template-columns:80px 70px 70px;gap:8px;margin-bottom:6px;align-items:center">
      <span style="font-size:13px;color:var(--color-text-primary)">${l}</span>
      <input type="text" id="h_pre_${i}" placeholder="전주">
      <input type="text" id="h_cur_${i}" placeholder="금주">
    </div>`;
  });
}

function buildIssueBlocks(){
  const c = document.getElementById('issue-blocks');
  for(let i=0;i<issueCount;i++){
    c.innerHTML += `<div class="issue-block">
      <div class="issue-num">Issue #${i+1}</div>
      <div class="grid-2" style="gap:8px;margin-bottom:6px">
        <div class="field"><label>내용</label><textarea id="iss_content_${i}" rows="2" placeholder="이슈 내용"></textarea></div>
        <div class="field"><label>영향</label><textarea id="iss_impact_${i}" rows="2" placeholder="영향 범위"></textarea></div>
      </div>
      <div class="grid-2" style="gap:8px">
        <div class="field"><label>대응 현황</label><textarea id="iss_action_${i}" rows="2" placeholder="현재 조치사항"></textarea></div>
        <div class="field"><label>향후 계획</label><textarea id="iss_plan_${i}" rows="2" placeholder="향후 계획"></textarea></div>
      </div>
    </div>`;
  }
}

function buildTaskRows(){
  const c = document.getElementById('task-rows');
  for(let i=0;i<taskCount;i++){
    c.innerHTML += `<div style="display:grid;grid-template-columns:28px 1fr 120px 80px;gap:8px;margin-bottom:6px;align-items:center">
      <span style="font-size:13px;color:var(--color-text-secondary);text-align:center">${i+1}</span>
      <input type="text" id="t_content_${i}" placeholder="추진 내용">
      <input type="text" id="t_date_${i}" placeholder="목표 일정">
      <input type="text" id="t_owner_${i}" placeholder="담당">
    </div>`;
  }
}

function switchTab(id){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  event.target.closest('.tab').classList.add('active');
}

function collectData(){
  const sales = salesLabels.map((l,i)=>({label:l, cur:document.getElementById(`s_cur_${i}`)?.value||'', pre:document.getElementById(`s_pre_${i}`)?.value||''}));
  const buyers = buyerLabels.map((l,i)=>({buyer:l, qty:document.getElementById(`b_qty_${i}`)?.value||'', amt:document.getElementById(`b_amt_${i}`)?.value||'', plan:document.getElementById(`b_plan_${i}`)?.value||'', rate:document.getElementById(`b_rate_${i}`)?.value||''}));
  const lines = [];
  for(let i=0;i<lineCount;i++){
    const fac=document.getElementById(`l_fac_${i}`)?.value||'';
    if(fac) lines.push({factory:fac, total:document.getElementById(`l_tot_${i}`)?.value||'', running:document.getElementById(`l_run_${i}`)?.value||'', item:document.getElementById(`l_item_${i}`)?.value||''});
  }
  const hr = hrLabels.map((l,i)=>({label:l, pre:document.getElementById(`h_pre_${i}`)?.value||'', cur:document.getElementById(`h_cur_${i}`)?.value||''}));
  const issues = [];
  for(let i=0;i<issueCount;i++){
    const c=document.getElementById(`iss_content_${i}`)?.value||'';
    if(c) issues.push({content:c, impact:document.getElementById(`iss_impact_${i}`)?.value||'', action:document.getElementById(`iss_action_${i}`)?.value||'', plan:document.getElementById(`iss_plan_${i}`)?.value||''});
  }
  const tasks = [];
  for(let i=0;i<taskCount;i++){
    const c=document.getElementById(`t_content_${i}`)?.value||'';
    if(c) tasks.push({content:c, date:document.getElementById(`t_date_${i}`)?.value||'', owner:document.getElementById(`t_owner_${i}`)?.value||''});
  }
  return {sales, buyers, lines, hr,
    joiners: document.getElementById('joiners')?.value||'',
    leavers: document.getElementById('leavers')?.value||'',
    visits: document.getElementById('visits')?.value||'',
    support: document.getElementById('support')?.value||'',
    lang: document.getElementById('lang')?.value||'ko',
    format: document.getElementById('format')?.value||'executive',
    extra: document.getElementById('extra')?.value||''
  };
}

function buildPrompt(d){
  const fmtMap = {executive:'경영진 요약 보고 형식 (핵심 수치·리스크·액션 중심, 간결)', detailed:'전체 상세 보고 형식 (각 섹션별 분석 포함)', kpi:'KPI 중심 보고 형식 (핵심 KPI 수치 우선, 증감 분석 강조)'};
  const langMap = {ko:'한국어', en:'English', both:'한국어와 영어 병기'};

  let raw = `아래는 이번 주 주간회의 RAW 데이터입니다.

【1. 출고 / 매출】
${d.sales.map(s=>`- ${s.label}: 금주 ${s.cur||'-'} / 전주 ${s.pre||'-'} / 증감 ${calcDiff(s.cur,s.pre)}`).join('\n')}

【2. 주요 바이어 수주 현황】
${d.buyers.filter(b=>b.qty||b.amt).map(b=>`- ${b.buyer}: YTD Qty ${b.qty||'-'}, YTD Amt ${b.amt||'-'} USD, Plan ${b.plan||'-'} USD, 달성율 ${b.rate||'-'}`).join('\n')||'(미입력)'}

【3. Line 운용 현황】
${d.lines.length ? d.lines.map(l=>`- ${l.factory}: Total ${l.total}라인 / Running ${l.running}라인 (가동율 ${l.total&&l.running ? Math.round(l.running/l.total*100)+'%' : '-'}) / 주요 품목: ${l.item||'-'}`).join('\n') : '(미입력)'}

【4. 인원 현황】
${d.hr.map(h=>`- ${h.label}: 전주 ${h.pre||'-'} / 금주 ${h.cur||'-'} / 증감 ${calcDiff(h.cur,h.pre)}`).join('\n')}
- 입사자: ${d.joiners||'없음'}
- 퇴사자: ${d.leavers||'없음'}

【5. 주간 이슈】
${d.issues.length ? d.issues.map((iss,i)=>`Issue #${i+1}\n  내용: ${iss.content}\n  영향: ${iss.impact||'-'}\n  대응: ${iss.action||'-'}\n  향후계획: ${iss.plan||'-'}`).join('\n') : '(미입력)'}

【6. 차주 중점 추진 업무】
${d.tasks.length ? d.tasks.map(t=>`- ${t.content} (일정: ${t.date||'-'}, 담당: ${t.owner||'-'})`).join('\n') : '(미입력)'}

【7. 방문 계획】
${d.visits||'(미입력)'}

【8. 지원 요청사항】
${d.support||'(미입력)'}`;

  let instruction = `당신은 의류 OEM/ODM 제조업체의 경영지원팀 시니어 매니저입니다. 위 RAW 데이터를 바탕으로 ${langMap[d.lang]}로 ${fmtMap[d.format]} 주간 보고서를 작성하세요.

보고서 구성:
1. 핵심 요약 (Executive Summary) - 3~5줄로 이번 주 핵심 현황
2. 출고·매출 현황 - 수치와 전주 대비 증감 분석
3. 주요 바이어 수주 현황 - 달성률 포함 분석
4. 공장 운영 현황 - Line 가동율 평가
5. 인원 현황 - 입퇴사 포함
6. 주요 이슈 및 리스크 - 각 이슈별 영향·대응 요약
7. 차주 중점 추진 계획
8. 지원 요청 / 방문 계획

작성 원칙:
- 숫자는 구체적으로 인용하고 전주 대비 증감(▲▼)을 명시
- 리스크나 미달성 항목은 원인과 대응을 명확히 서술
- 경영진이 빠르게 읽을 수 있도록 간결하고 구조적으로 작성
- 미입력 항목은 "미입력" 또는 해당 섹션 생략
${d.extra ? '- 추가 지시: ' + d.extra : ''}`;

  return instruction + '\n\n' + raw;
}

function calcDiff(cur, pre){
  const c=parseFloat(String(cur).replace(/,/g,'')), p=parseFloat(String(pre).replace(/,/g,''));
  if(isNaN(c)||isNaN(p)) return '-';
  const d=c-p;
  return (d>=0?'▲':'▼')+Math.abs(d).toLocaleString();
}

async function generate(){
  const btn=document.getElementById('gen-btn');
  const spin=document.getElementById('spin');
  const icon=document.getElementById('btn-icon');
  const lbl=document.getElementById('btn-label');
  btn.disabled=true; spin.style.display='block'; icon.style.display='none'; lbl.textContent='생성 중...';

  const d = collectData();
  const prompt = buildPrompt(d);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:'당신은 의류 제조업체의 경영지원팀 시니어 매니저입니다. 주간 보고서를 전문적이고 구조적으로 작성합니다.',
        messages:[{role:'user', content:prompt}]
      })
    });
    const data = await res.json();
    const text = data.content?.map(c=>c.text||'').join('') || '오류가 발생했습니다.';
    document.getElementById('output').textContent = text;
    document.getElementById('output-wrap').style.display = 'block';
    document.getElementById('output-wrap').scrollIntoView({behavior:'smooth'});
  } catch(e){
    document.getElementById('output').textContent = '오류: ' + e.message;
    document.getElementById('output-wrap').style.display = 'block';
  }

  btn.disabled=false; spin.style.display='none'; icon.style.display=''; lbl.textContent='보고서 생성하기 ↗';
}

function copyOutput(){
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.querySelector('.copy-btn');
    btn.innerHTML='<i class="ti ti-check"></i> 복사됨';
    setTimeout(()=>{btn.innerHTML='<i class="ti ti-copy"></i> 복사하기'},2000);
  });
}

buildSalesRows();
buildBuyerRows();
buildLineRows();
buildHrRows();
buildIssueBlocks();
buildTaskRows();
</script>
